server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location = /api {
        return 404;
    }

    location /api/ {
        return 404;
    }

    location = /admin {
        return 404;
    }

    location /admin/ {
        return 404;
    }

    location /static/ {
        return 404;
    }

    location /media/ {
        return 404;
    }

    location = /tracker.js {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
