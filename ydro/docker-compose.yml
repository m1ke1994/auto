services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.example
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - yadro_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - yadro_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      DJANGO_SERVE_MEDIA_FILES: "1"
      RUN_SEED_DEMO_DATA: "${RUN_SEED_DEMO_DATA:-0}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Host: $${DOMAIN}\" http://backend:8000/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - yadro_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      RUN_MIGRATIONS: 0
      RUN_COLLECTSTATIC: 0
      RUN_SEED_DEMO_DATA: 0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l INFO
    networks:
      - yadro_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      RUN_MIGRATIONS: 0
      RUN_COLLECTSTATIC: 0
      RUN_SEED_DEMO_DATA: 0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l INFO
    networks:
      - yadro_network

  telegram_polling:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      RUN_MIGRATIONS: 0
      RUN_COLLECTSTATIC: 0
      RUN_SEED_DEMO_DATA: 0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command:
      - sh
      - -c
      - >-
        case "$${TELEGRAM_USE_WEBHOOK:-false}" in
          1|true|TRUE|yes|YES|on|ON)
            echo "Telegram polling is disabled because webhook mode is enabled.";
            exec tail -f /dev/null
            ;;
        esac;
        if [ -z "$${TELEGRAM_BOT_TOKEN:-}" ]; then
          echo "Telegram polling is idle because TELEGRAM_BOT_TOKEN is empty.";
          exec tail -f /dev/null;
        fi;
        exec python manage.py run_telegram_polling
    networks:
      - yadro_network

  frontend:
    build:
      context: ./vue-admin
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./vue-admin/.env.example
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8001}:5173"
    volumes:
      - ./vue-admin:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host --port 5173
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - yadro_network

  public_site:
    profiles: ["public-site"]
    build:
      context: ../a-meditation/frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env.example
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_SITE_PORT:-5173}:3000"
    volumes:
      - ../a-meditation/frontend:/app
      - public_site_node_modules:/app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - yadro_network

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
  frontend_node_modules:
  public_site_node_modules:

networks:
  yadro_network:
    driver: bridge
