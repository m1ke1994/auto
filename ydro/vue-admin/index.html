    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#4c33e6" />
    <style>
      .app-boot {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-content: center;
        gap: 14px;
        padding: 24px;
        box-sizing: border-box;
        background: #fafbff;
        color: #17223b;
        text-align: center;
        font: 500 15px/1.5 Inter, system-ui, sans-serif;
      }
      .app-boot__spinner {
        width: 34px;
        height: 34px;
        margin: 0 auto;
        border: 3px solid #d8d0ff;
        border-top-color: #6d5df6;
        border-radius: 999px;
        animation: app-boot-spin 0.8s linear infinite;
      }
      .app-boot__error {
        max-width: 420px;
        opacity: 0;
        animation: app-boot-show-error 1ms 8s forwards;
      }
      .app-boot.is-error .app-boot__spinner,
      .app-boot.is-error > p {
        display: none;
      }
      .app-boot.is-error .app-boot__error {
        opacity: 1;
        animation: none;
      }
      .app-boot__error a {
        display: inline-flex;
        margin-top: 12px;
        border-radius: 14px;
        background: #6d5df6;
        padding: 10px 16px;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
      @keyframes app-boot-show-error { to { opacity: 1; } }
    </style>
