name: volga-public-site

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://tracknode.ru/api}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://tracknode.ru}
        VITE_SITE_SLUG: ${VITE_SITE_SLUG:-novaya-konakova}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://novoe-konakovo.ru}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://novoe-konakovo.ru}
    restart: unless-stopped
    ports:
      - "${PUBLIC_SITE_PORT:-3001}:3000"
